name: school-timetable-env
version: "1.0.0"
description: >
  A realistic multi-step RL environment simulating a school administrator
  building a conflict-free weekly class timetable. The agent assigns subjects
  to divisions, allocates qualified faculty and rooms, resolves scheduling
  conflicts, and optimizes resource utilization across multiple divisions.

author: OpenEnv Hackathon Team
category: real-world / planning / combinatorial-optimization

# ── OpenEnv Core Compliance ───────────────────────────────────
openenv_core_version: ">=0.2.1"
server_class: "environment.SchoolTimetableEnvironment"
action_class: "models.TimetableAction"
observation_class: "models.TimetableObservation"
state_class: "models.TimetableState"
supports_concurrent_sessions: true
max_concurrent_envs: 64

# ── Install ───────────────────────────────────────────────────
install: |
  pip install "openenv-school-timetable @ git+https://huggingface.co/spaces/{your-username}/school-timetable-env"

# ── Endpoints (auto-generated by create_app) ─────────────────
endpoints:
  websocket: /ws          # persistent session — used by EnvClient and TRL
  reset:     POST /reset  # stateless reset
  step:      POST /step   # stateless step
  state:     GET  /state  # episode metadata
  health:    GET  /health # health check
  docs:      GET  /docs   # OpenAPI docs
  ui:        GET  /ui     # interactive demo UI

# ── Action Space ──────────────────────────────────────────────
action_space:
  type: structured
  class: TimetableAction
  actions:
    - name: assign_class
      description: Assign a subject session to a division with a faculty member and room
      fields:
        action_type: "assign_class"
        division_id: string   # e.g. "Sem1-A"
        subject_id:  string   # e.g. "MATH"
        faculty_id:  string   # e.g. "F001"
        room_id:     string   # e.g. "CR101"
        slot_id:     string   # e.g. "Mon-1"

    - name: reschedule_class
      description: Move an existing timetable entry to a new slot
      fields:
        action_type:    "reschedule_class"
        entry_id:       string           # existing entry ID
        new_slot_id:    string
        new_room_id:    string (optional)
        new_faculty_id: string (optional)

    - name: remove_assignment
      description: Remove an existing timetable entry
      fields:
        action_type: "remove_assignment"
        entry_id:    string

# ── Observation Space ─────────────────────────────────────────
observation_space:
  type: structured
  class: TimetableObservation
  fields:
    done:                     bool
    reward:                   float
    step_count:               int
    completion_percentage:    float        # 0.0 – 100.0
    assigned_sessions:        int
    total_required_sessions:  int
    divisions_complete:       list[string]
    divisions_pending:        list[string]
    timetable_entries:        list[dict]   # {entry_id, division_id, subject_id, faculty_id, room_id, slot_id}
    violations:               list[dict]   # constraint violations from last action
    pending_work:             list[dict]   # {division_id, subjects_needed: {subject_id: count}}
    faculty_status:           list[dict]   # {faculty_id, name, free_slots, current_load, max_workload, can_teach}
    termination_reason:       string|null  # "complete" | "max_steps" | "too_many_invalid"

# ── State ─────────────────────────────────────────────────────
state_space:
  class: TimetableState
  fields:
    episode_id:              string|null
    step_count:              int
    task:                    string   # "easy" | "medium" | "hard"
    total_required_sessions: int
    completion_percentage:   float
    total_conflicts:         int
    cumulative_reward:       float
    final_score:             float|null

# ── Reward ────────────────────────────────────────────────────
reward:
  type: dense
  step_rewards:
    valid_assignment:   +0.20
    invalid_conflict:   -0.30
    efficient_decision: +0.10   # bonus for scheduling high-urgency subjects
    redundant_action:   -0.10
    reschedule_bonus:   +0.05
  final_score:
    range: [0.0, 1.0]
    formula: "0.50 * completeness + 0.30 * conflict_free + 0.20 * efficiency"
    weights:
      completeness:   0.50
      conflict_free:  0.30
      efficiency:     0.20

# ── Hard Constraints ──────────────────────────────────────────
constraints:
  - id: teacher_double_booking
    description: Faculty cannot teach two classes in the same slot
    penalty: -0.30
  - id: room_double_booking
    description: A room cannot host two classes in the same slot
    penalty: -0.30
  - id: faculty_availability
    description: Faculty can only teach in their declared available slots
    penalty: -0.30
  - id: subject_faculty_match
    description: Faculty can only teach subjects they are qualified for
    penalty: -0.30
  - id: lab_requirement
    description: Lab subjects must use lab rooms; theory subjects must use classrooms
    penalty: -0.30
  - id: workload_limit
    description: Faculty cannot exceed their declared max_workload per week
    penalty: -0.30
  - id: division_slot_conflict
    description: A division can only have one class per slot
    penalty: -0.30

# ── Termination ───────────────────────────────────────────────
termination:
  - reason: complete
    condition: All required sessions for all divisions have been assigned
  - reason: max_steps
    condition: Step count reaches config.max_steps
  - reason: too_many_invalid
    condition: Invalid action count reaches config.max_invalid_actions

# ── Tasks ─────────────────────────────────────────────────────
tasks:
  - id: easy
    difficulty: green
    description: >
      1 division, 4 subjects (MATH/ENG/SCI/HIST), 3 faculty, 2 classrooms.
      No lab subjects. Full faculty availability. ~9 sessions to schedule.
    max_steps: 60
    max_invalid_actions: 15
    target_score: 0.90
    grader:
      enabled: true
      function: "env.tasks.EasyTask.grade"

  - id: medium
    difficulty: yellow
    description: >
      2 divisions, 6 subjects (1 lab: CHEMLAB), 5 faculty with limited
      availability windows. Requires conflict resolution and lab scheduling.
      ~19 sessions to schedule.
    max_steps: 150
    max_invalid_actions: 20
    target_score: 0.80
    grader:
      enabled: true
      function: "env.tasks.MediumTask.grade"

  - id: hard
    difficulty: red
    description: >
      3 divisions, 8 subjects (2 labs: PHYLAB + CHEMLAB), 8 faculty with
      uneven availability and tight workload constraints. Optimization required.
      ~39 sessions to schedule.
    max_steps: 300
    max_invalid_actions: 25
    target_score: 0.70
    grader:
      enabled: true
      function: "env.tasks.HardTask.grade"

# ── TRL / GRPO Integration ────────────────────────────────────
trl_integration:
  description: >
    Use SchoolTimetableEnvClient with TRL's GRPOTrainer via environment_factory.
    The agent calls assign_class() as a tool to schedule sessions.
  example: |
    from client import SchoolTimetableEnvClient, TimetableAction

    class TimetableToolEnv:
        def __init__(self):
            self.client = SchoolTimetableEnvClient(
                base_url="https://your-space.hf.space"
            ).sync()
            self.reward = 0.0

        def reset(self, task: str = "easy", **kwargs) -> str:
            obs = self.client.reset(task=task)
            self.reward = 0.0
            return f"Schedule {obs.total_required_sessions} sessions. Pending: {obs.pending_work}"

        def assign_class(self, division_id: str, subject_id: str,
                         faculty_id: str, room_id: str, slot_id: str) -> str:
            """Assign a subject session to a division.
            Args:
                division_id: Division ID (e.g. Sem1-A)
                subject_id: Subject ID (e.g. MATH)
                faculty_id: Faculty ID (e.g. F001)
                room_id: Room ID (e.g. CR101)
                slot_id: Time slot ID (e.g. Mon-1)
            Returns: Assignment result with reward and completion percentage
            """
            obs = self.client.step(TimetableAction(
                action_type="assign_class",
                division_id=division_id, subject_id=subject_id,
                faculty_id=faculty_id, room_id=room_id, slot_id=slot_id,
            ))
            self.reward = obs.reward
            return f"completion={obs.completion_percentage}% violations={obs.violations}"

# ── Dependencies ──────────────────────────────────────────────
dependencies:
  required:
    - openenv-core[core]>=0.2.1
    - pydantic>=2.0,<3.0
    - fastapi>=0.104
    - uvicorn>=0.24
  optional:
    - openai>=1.0      # for inference.py LLM agent
    - trl>=0.12        # for GRPO training

python_version: ">=3.10"
